<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KodShop — тренажёр экзамена КОД</title>
  <style>
    :root { --bg:#0f172a; --panel:#1e293b; --accent:#6366f1; --text:#e2e8f0; --muted:#94a3b8; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Segoe UI, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:grid; grid-template-columns:320px 1fr; }
    aside { background:var(--panel); padding:1rem; overflow:auto; border-right:1px solid #334155; display:flex; flex-direction:column; gap:.65rem; }
    main { display:grid; grid-template-rows:auto auto auto 1fr auto; gap:.75rem; padding:1rem; overflow:hidden; min-height:0; }
    h1 { font-size:1.05rem; margin:0; }
    h3 { font-size:.85rem; margin:0 0 .35rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
    .step-list { flex:1; overflow:auto; }
    .step-list button { display:block; width:100%; text-align:left; margin:.2rem 0; padding:.4rem .55rem; background:#334155; border:none; color:var(--text); border-radius:6px; cursor:pointer; font-size:.8rem; }
    .step-list button.active { background:var(--accent); }
    .step-list button.done { opacity:.5; text-decoration:line-through; }
    .meta { background:var(--panel); padding:.75rem 1rem; border-radius:10px; }
    .meta h2 { margin:0 0 .35rem; font-size:1rem; word-break:break-all; }
    .hint { color:var(--muted); white-space:pre-wrap; font-size:.9rem; line-height:1.4; }
    .terminal { background:#0b1220; padding:.75rem; border-radius:8px; font-family:Consolas, monospace; font-size:.82rem; color:#a5f3fc; white-space:pre-wrap; margin-top:.5rem; }
    .toolbar { display:flex; flex-wrap:wrap; gap:.45rem; align-items:center; }
    .toolbar button, .toolbar select { padding:.4rem .65rem; border-radius:6px; border:1px solid #475569; background:#334155; color:var(--text); cursor:pointer; font-size:.85rem; }
    .toolbar button.primary { background:var(--accent); border-color:var(--accent); }
    .code-box { background:#0b1220; border-radius:10px; padding:1rem; overflow:auto; font-family:Consolas, monospace; font-size:.85rem; line-height:1.45; border:1px solid #334155; min-height:160px; }
    .typed { color:#86efac; white-space:pre-wrap; }
    .pending { color:#64748b; white-space:pre-wrap; }
    .progress { font-size:.85rem; color:var(--muted); }
    .phase-badge { display:inline-block; background:#4338ca; padding:.15rem .5rem; border-radius:999px; font-size:.72rem; margin-bottom:.35rem; margin-right:.35rem; }
    .module-badge { display:inline-block; background:#0f766e; padding:.15rem .5rem; border-radius:999px; font-size:.72rem; margin-bottom:.35rem; }
    .banner { background:#422006; color:#fde68a; padding:.5rem .75rem; border-radius:8px; font-size:.85rem; }
    .timers { background:#0b1220; border:1px solid #334155; border-radius:10px; padding:.65rem; }
    .timer-card { background:#1e293b; border-radius:8px; padding:.55rem .65rem; margin-bottom:.45rem; border-left:3px solid var(--accent); }
    .timer-card.active { border-left-color:var(--ok); background:#14532d33; }
    .timer-card.warning { border-left-color:var(--warn); }
    .timer-card.overdue { border-left-color:var(--danger); animation:pulse 1.2s infinite; }
    .timer-head { display:flex; justify-content:space-between; align-items:center; gap:.5rem; font-size:.82rem; }
    .timer-time { font-family:Consolas, monospace; font-size:1rem; font-weight:700; }
    .timer-desc { font-size:.72rem; color:var(--muted); margin-top:.2rem; }
    .timer-actions { display:flex; gap:.3rem; margin-top:.4rem; flex-wrap:wrap; }
    .timer-actions button { padding:.2rem .45rem; font-size:.72rem; border-radius:5px; border:1px solid #475569; background:#334155; color:var(--text); cursor:pointer; }
    .btn-block { width:100%; padding:.45rem; border-radius:6px; border:1px solid #475569; background:#334155; color:var(--text); cursor:pointer; font-size:.82rem; }
    .btn-block.primary { background:var(--accent); border-color:var(--accent); }
    @keyframes pulse { 50% { opacity:.75; } }
    @media (max-width:900px) { body { grid-template-columns:1fr; } aside { max-height:42vh; } }
  </style>
</head>
<body>
  <aside>
    <h1>Тренажёр KodShopWeb</h1>
    <p class="progress" id="progressText">0 / 0</p>

    <div class="timers">
      <h3>Таймеры модулей</h3>
      <div id="timerCards"></div>
      <button class="btn-block" id="resetAllTimersBtn">Сбросить все таймеры</button>
    </div>

    <button class="btn-block primary" id="resetProgressBtn">Сбросить прогресс шагов</button>
    <div class="step-list" id="stepList"></div>
  </aside>
  <main>
    <div class="banner">Браузерная версия (index.html). Для Visual Studio и автоперехода по файлам запускайте <strong>Start-ExamCoachDesktop.bat</strong> или <strong>DesktopApp\ExamCoachDesktop.exe</strong>.</div>
    <div class="meta">
      <div>
        <span class="module-badge" id="moduleBadge"></span>
        <span class="phase-badge" id="phaseBadge"></span>
      </div>
      <h2 id="stepTitle"></h2>
      <div class="hint" id="vsHint"></div>
      <div class="terminal" id="terminalBox" hidden></div>
    </div>
    <div class="toolbar">
      <button class="primary" id="prevBtn">← Назад</button>
      <button class="primary" id="nextBtn">Далее →</button>
      <button id="markDoneBtn">✓ Готово</button>
      <select id="modeSelect" title="Как показывать код">
        <option value="line">Построчно</option>
        <option value="word">По словам</option>
        <option value="char">По буквам</option>
        <option value="all">Весь файл</option>
      </select>
      <button id="revealBtn">Показать фрагмент</button>
      <button id="reveal10Btn">+10 строк</button>
      <button id="copyBtn">Копировать код</button>
    </div>
    <div class="code-box"><span class="typed" id="typedPart"></span><span class="pending" id="pendingPart"></span></div>
    <div class="progress" id="fragmentInfo">Пробел или → — следующий фрагмент. ← — предыдущий шаг.</div>
  </main>
  <script>
    const STEPS = [{"id":"setup-1","phase":"0. Start","module":"m1","title":"Create ASP.NET Core project in Visual Studio","vsHint":"Recommended: ASP.NET Core Web App (Model-View-Controller), .NET 8.\nAlso works: Empty template — ExamCoach will create Models, Controllers, Views folders.\nAny project name (not only KodShopWeb).","terminal":"dotnet new mvc -n KodShopWeb -f net8.0 -o KodShopWeb\n:: or empty: dotnet new web -n MyShop -f net8.0 -o MyShop","code":""},{"id":"setup-2","phase":"0. Start","module":"m1","title":"Install NuGet packages (version 8.x for .NET 8)","vsHint":"Right click project -\u003e Manage NuGet Packages:\n- Microsoft.EntityFrameworkCore.Sqlite 8.0.11\n- Microsoft.EntityFrameworkCore.Design 8.0.11\n- ClosedXML 0.105.0\n\nOr Package Manager Console:","terminal":"Install-Package Microsoft.EntityFrameworkCore.Sqlite -Version 8.0.11\nInstall-Package Microsoft.EntityFrameworkCore.Design -Version 8.0.11\nInstall-Package ClosedXML -Version 0.105.0","code":""},{"id":"setup-3","phase":"0. Start","module":"m1","title":"Create folder structure","vsHint":"Add folders: Models, Data, Services, ViewModels, Docs.\nAdd wwwroot/images/products.\nCopy picture.png from KOD resources to wwwroot/images/.","terminal":"","code":""},{"id":"setup-4","phase":"1. Models","module":"m1","title":"ER-diagram (PDF)","vsHint":"Open Docs/ER-Diagram.html in browser → Print → Save as PDF → Docs/ER-Diagram.pdf.\nAttach ER-Diagram.pdf to exam materials (module 1 requirement).","terminal":"","code":""},{"id":"file-appsettings-json","phase":"0. Start","module":"m1","title":"appsettings.json","vsHint":"Add ConnectionStrings and Shop section.","terminal":"","code":"{\n  \"ConnectionStrings\": {\n    \"DefaultConnection\": \"Data Source=kodshop.db\"\n  },\n  \"Shop\": {\n    \"Variant\": \"BU\"\n  },\n  \"Logging\": {\n    \"LogLevel\": {\n      \"Default\": \"Information\",\n      \"Microsoft.AspNetCore\": \"Warning\"\n    }\n  },\n  \"AllowedHosts\": \"*\"\n}\n"},{"id":"file-KodShopWeb-csproj","phase":"0. Start","module":"m1","title":"KodShopWeb.csproj","vsHint":"Check PackageReference items in csproj.","terminal":"","code":"\u003cProject Sdk=\"Microsoft.NET.Sdk.Web\"\u003e\n\n  \u003cPropertyGroup\u003e\n    \u003cTargetFramework\u003enet8.0\u003c/TargetFramework\u003e\n    \u003cNullable\u003eenable\u003c/Nullable\u003e\n    \u003cImplicitUsings\u003eenable\u003c/ImplicitUsings\u003e\n  \u003c/PropertyGroup\u003e\n\n  \u003cItemGroup\u003e\r\n    \u003cCompile Remove=\"ExamCoach/**\" /\u003e\r\n    \u003cContent Remove=\"ExamCoach/**\" /\u003e\r\n    \u003cNone Remove=\"ExamCoach/**\" /\u003e\r\n    \u003cEmbeddedResource Remove=\"ExamCoach/**\" /\u003e\r\n  \u003c/ItemGroup\u003e\r\n  \u003cItemGroup\u003e\n    \u003cPackageReference Include=\"ClosedXML\" Version=\"0.105.0\" /\u003e\n    \u003cPackageReference Include=\"Microsoft.EntityFrameworkCore.Design\" Version=\"8.0.11\"\u003e\n      \u003cPrivateAssets\u003eall\u003c/PrivateAssets\u003e\n      \u003cIncludeAssets\u003eruntime; build; native; contentfiles; analyzers; buildtransitive\u003c/IncludeAssets\u003e\n    \u003c/PackageReference\u003e\n    \u003cPackageReference Include=\"Microsoft.EntityFrameworkCore.Sqlite\" Version=\"8.0.11\" /\u003e\n  \u003c/ItemGroup\u003e\n\n\u003c/Project\u003e\n"},{"id":"file-Docs-ER-Diagram-html","phase":"1. Models","module":"m1","title":"Docs/ER-Diagram.html","vsHint":"ER-diagram source; export to Docs/ER-Diagram.pdf for exam.","terminal":"","code":"\u003c!DOCTYPE html\u003e\r\n\u003chtml lang=\"ru\"\u003e\r\n\u003chead\u003e\r\n    \u003cmeta charset=\"utf-8\" /\u003e\r\n    \u003ctitle\u003eER-диаграмма — KodShopWeb\u003c/title\u003e\r\n    \u003cstyle\u003e\r\n        body { font-family: \"Times New Roman\", serif; margin: 24px; color: #222; }\r\n        h1 { font-size: 20px; margin-bottom: 8px; }\r\n        p.note { font-size: 12px; color: #555; margin-bottom: 24px; }\r\n        .diagram { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\r\n        .entity { border: 2px solid #333; border-radius: 6px; padding: 10px; page-break-inside: avoid; }\r\n        .entity h2 { font-size: 14px; margin: 0 0 8px; text-align: center; background: #eee; padding: 4px; }\r\n        .entity ul { list-style: none; padding: 0; margin: 0; font-size: 12px; }\r\n        .entity li { padding: 2px 0; border-bottom: 1px dotted #ccc; }\r\n        .pk { font-weight: bold; }\r\n        .fk { color: #004080; }\r\n        .relations { margin-top: 28px; font-size: 13px; line-height: 1.6; }\r\n        @media print { .note { display: none; } }\r\n    \u003c/style\u003e\r\n\u003c/head\u003e\r\n\u003cbody\u003e\r\n    \u003ch1\u003eER-диаграмма базы данных KodShopWeb\u003c/h1\u003e\r\n    \u003cp class=\"note\"\u003eДля сдачи: откройте этот файл в браузере → Печать → «Сохранить как PDF» → Docs/ER-Diagram.pdf\u003c/p\u003e\r\n\r\n    \u003cdiv class=\"diagram\"\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003eAppUser\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eFullName\u003c/li\u003e\r\n                \u003cli\u003eLogin\u003c/li\u003e\r\n                \u003cli\u003ePassword\u003c/li\u003e\r\n                \u003cli\u003eRole\u003c/li\u003e\r\n                \u003cli\u003eEmail\u003c/li\u003e\r\n            \u003c/ul\u003e\r\n        \u003c/div\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003eCategory\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eName\u003c/li\u003e\r\n            \u003c/ul\u003e\r\n        \u003c/div\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003eManufacturer\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eName\u003c/li\u003e\r\n            \u003c/ul\u003e\r\n        \u003c/div\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003eSupplier\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eName\u003c/li\u003e\r\n            \u003c/ul\u003e\r\n        \u003c/div\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003eProduct\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eArticle\u003c/li\u003e\r\n                \u003cli\u003eName, Description\u003c/li\u003e\r\n                \u003cli\u003ePrice, Unit\u003c/li\u003e\r\n                \u003cli\u003eQuantityOnStock\u003c/li\u003e\r\n                \u003cli\u003eDiscount, ImagePath\u003c/li\u003e\r\n                \u003cli class=\"fk\"\u003eCategoryId (FK)\u003c/li\u003e\r\n                \u003cli class=\"fk\"\u003eManufacturerId (FK)\u003c/li\u003e\r\n                \u003cli class=\"fk\"\u003eSupplierId (FK)\u003c/li\u003e\r\n            \u003c/ul\u003e\r\n        \u003c/div\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003ePickupPoint\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eAddress\u003c/li\u003e\r\n            \u003c/ul\u003e\r\n        \u003c/div\u003e\r\n        \u003cdiv class=\"entity\"\u003e\r\n            \u003ch2\u003eOrder\u003c/h2\u003e\r\n            \u003cul\u003e\r\n                \u003cli class=\"pk\"\u003eId (PK)\u003c/li\u003e\r\n                \u003cli\u003eArticle\u003c/li\u003e\r\n                \u003cli\u003eStatus\u003c/li\u003e\r\n                \u003cli\u003eOrderDate\u003c/li\u003e\r\n                \u003cli\u003eDeliveryDate\u003c/li\u003e\r\n                \u003cli\u003ePickupCode\u003c/li\u003e\r\n                \u003cli iers =\u003e Set\u003cSupplier\u003e();\r\n\r\n    /// \u003csummary\u003eТаблица товаров.\u003c/summary\u003e\r\n    public DbSet\u003cProduct\u003e Products =\u003e Set\u003cProduct\u003e();\r\n\r\n    /// \u003csummary\u003eТаблица пунктов выдачи.\u003c/summary\u003e\r\n    public DbSet\u003cPickupPoint\u003e PickupPoints =\u003e Set\u003cPickupPoint\u003e();\r\n\r\n    /// \u003csummary\u003eТаблица заказов.\u003c/summary\u003e\r\n    public DbSet\u003cOrder\u003e Orders =\u003e Set\u003cOrder\u003e();\r\n\r\n    /// \u003csummary\u003eТаблица позиций заказов.\u003c/summary\u003e\r\n    public DbSet\u003cOrderItem\u003e OrderItems =\u003e Set\u003cOrderItem\u003e();\r\n\r\n    /// \u003csummary\u003e\r\n    /// Настройка модели данных: уникальные индексы, точность полей, каскадное удаление.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"modelBuilder\"\u003eПостроитель модели EF Core.\u003c/param\u003e\r\n    protected override void OnModelCreating(ModelBuilder modelBuilder)\r\n    {\r\n        // Логин пользователя должен быть уникальным.\r\n        modelBuilder.Entity\u003cAppUser\u003e(entity =\u003e\r\n        {\r\n            entity.HasIndex(u =\u003e u.Login).IsUnique();\r\n        });\r\n\r\n        modelBuilder.Entity\u003cProduct\u003e(entity =\u003e\r\n        {\r\n            // Артикул товара — уникальный; цена и скидка с фиксированной точностью.\r\n            entity.HasIndex(p =\u003e p.Article).IsUnique();\r\n            entity.Property(p =\u003e p.Price).HasPrecision(10, 2);\r\n            entity.Property(p =\u003e p.Discount).HasPrecision(5, 2);\r\n        });\r\n\r\n        modelBuilder.Entity\u003cOrder\u003e(entity =\u003e\r\n        {\r\n            entity.HasIndex(o =\u003e o.Article).IsUnique();\r\n        });\r\n\r\n        modelBuilder.Entity\u003cOrderItem\u003e(entity =\u003e\r\n        {\r\n            // При удалении заказа позиции удаляются каскадно.\r\n            entity.HasOne(i =\u003e i.Order)\r\n                .WithMany(o =\u003e o.Items)\r\n                .HasForeignKey(i =\u003e i.OrderId)\r\n                .OnDelete(DeleteBehavior.Cascade);\r\n\r\n            // Товар с позициями в заказах удалить нельзя (Restrict).\r\n            entity.HasOne(i =\u003e i.Product)\r\n                .WithMany(p =\u003e p.OrderItems)\r\n                .HasForeignKey(i =\u003e i.ProductId)\r\n                .OnDelete(DeleteBehavior.Restrict);\r\n        });\r\n    }\r\n}\r\n"},{"id":"file-Data-DbSeeder-cs","phase":"2. Database","module":"m1","title":"Data/DbSeeder.cs","vsHint":"Seed test users and products.","terminal":"","code":"using KodShopWeb.Models;\r\nusing Microsoft.EntityFrameworkCore;\r\n\r\nnamespace KodShopWeb.Data;\r\n\r\n/// \u003csummary\u003e\r\n/// Начальное заполнение базы данных тестовыми данными.\r\n/// Каталог зависит от варианта PU/BU; пример заказа создаётся всегда.\r\n/// \u003c/summary\u003e\r\npublic static class DbSeeder\r\n{\r\n    /// \u003csummary\u003e\r\n    /// Создаёт схему БД и заполняет справочники, пользователей, товары и пример заказа.\r\n    /// Пропускает заполнение, если в таблице Products уже есть записи.\r\n    /// \u003c/summary\u003e\r\n    public static async Task SeedAsync(AppDbContext db, IWebHostEnvironment env, ShopSettings settings)\r\n    {\r\n        await db.Database.EnsureCreatedAsync();\r\n\r\n        if (await db.Products.AnyAsync())\r\n            return;\r\n\r\n        var pickupPoints = new[]\r\n        {\r\n            new PickupPoint { Address = \"344288, г. Лесной, ул. Чехова, 1\" },\r\n            new PickupPoint { Address = \"614164, г. Лесной, ул. Степная, 30\" },\r\n            new PickupPoint { Address = \"394242, г. Лесной, ул. Коммунистическая, 43\" }\r\n        };\r\n        db.PickupPoints.AddRange(pickupPoints);\r\n\r\n        var users = new[]\r\n        {\r\n            new AppUser { FullName = \"Админов Админ Админович\", Login = \"admin\", Password = \"admin\", Role = UserRole.Administrator, Email = \"admin@shop.local\" },\r\n            new AppUser { FullName = \"Менеджеров Менеджер Менеджерович\", Login = \"manager\", Password = \"manager\", Role = UserRole.Manager, Email = \"manager@shop.local\" },\r\n            new AppUser { FullName = \"Клиентов Клиент Клиентович\", Login = \"client\", Password = \"client\", Role = UserRole.Client, Email = \"client@shop.local\" }\r\n        };\r\n        db.Users.AddRange(users);\r\n\r\n        List\u003cProduct\u003e products;\r\n        if (settings.IsProfileVariant)\r\n            products = await SeedBookCatalogAsync(db);\r\n        else\r\n            products = await SeedBikeCatalogAsync(db);\r\n\r\n        await db.SaveChangesAsync();\r\n\r\n        if (settings.OrdersEnabled)\r\n        {\r\n            var client = await db.Users.FirstAsync(u =\u003e u.Role == UserRole.Client);\r\n            var order = new Order\r\n            {\r\n                Article = \"ORD-001\",\r\n                Status = OrderStatus.New,\r\n                OrderDate = DateTime.Today.AddDays(-2),\r\n                DeliveryDate = null,\r\n                PickupCode = \"482913\",\r\n                PickupPointId = pickupPoints[0].Id,\r\n                ClientId = client.Id,\r\n                Items =\r\n                [\r\n                    new OrderItem { ProductId = products[0].Id, Quantity = 2 },\r\n                    new OrderItem { ProductId = products[2].Id, Quantity = 1 }\r\n                ]\r\n            };\r\n            db.Orders.Add(order);\r\n            await db.SaveChangesAsync();\r\n        }\r\n\r\n        CopySeedImages(env);\r\n    }\r\n\r\n    private static async Task\u003cList\u003cProduct\u003e\u003e SeedBookCatalogAsync(AppDbContext db)\r\n    {\r\n        var categories = new[]\r\n        {\r\n            new Category { Name = \"Роман\" },\r\n            new Category { Name = \"Хрестоматия\" },\r\n            new Category { Name = \"Учебник\" }\r\n        };\r\n        db.Categories.AddRange(categories);\r\n\r\n        var manufacturers = new[]\r\n        {\r\n            new Manufacturer { Name = \"АСТ\" },\r\n            new Manufacturer { Name = \"Эксмо\" },\r\n            new Manufacturer { Name = \"Просвещение\" }\r\n        };\r\n        db.Manufacturers.AddRange(manufacturers);\r\n\r\n        var suppliers = new[]\r\n        {\r\n            new Supplier { Name = \"ООО «Книжный склад»\" },\r\n            new Supplier { Name = \"ИП Петров\" }\r\n        };\r\n        db.Suppliers.AddRange(suppliers);\r\n\r\n        await db.SaveChangesAsync();\r\n\r\n        var products = new List\u003cProduct\u003e\r\n        {\r\n            new()\r\n            {\r\n                Article = \"A112T4\",\r\n                Name = \"Прокляты и убиты\",\r\n                Description = \"Роман-эпопея Виктора Астафьева.\",\r\n                Price = 890m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 12,\r\n                Discount = 28m,\r\n                CategoryId = categories[0].Id,\r\n                ManufacturerId = manufacturers[0].Id,\r\n                SupplierId = suppliers[0].Id,\r\n                ImagePath = \"/images/products/1.jpg\"\r\n            },\r\n            new()\r\n            {\r\n                Article = \"G843H5\",\r\n                Name = \"Хрестоматия по литературе\",\r\n                Description = \"Сборник для старших классов.\",\r\n                Price = 450m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 0,\r\n                Discount = 0m,\r\n                CategoryId = categories[1].Id,\r\n                ManufacturerId = manufacturers[2].Id,\r\n                SupplierId = suppliers[0].Id,\r\n                ImagePath = null\r\n            },\r\n            new()\r\n            {\r\n                Article = \"D325D4\",\r\n                Name = \"Основы программирования\",\r\n                Description = \"Учебник для СПО.\",\r\n                Price = 1200m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 5,\r\n                Discount = 15m,\r\n                CategoryId = categories[2].Id,\r\n                ManufacturerId = manufacturers[2].Id,\r\n                SupplierId = suppliers[1].Id,\r\n                ImagePath = \"/images/products/3.jpg\"\r\n            },\r\n            new()\r\n            {\r\n                Article = \"S432T5\",\r\n                Name = \"Тихий Дон\",\r\n                Description = \"Классика русской литературы.\",\r\n                Price = 760m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 8,\r\n                Discount = 10m,\r\n                CategoryId = categories[0].Id,\r\n                ManufacturerId = manufacturers[1].Id,\r\n                SupplierId = suppliers[0].Id,\r\n                ImagePath = \"/images/products/4.jpg\"\r\n            }\r\n        };\r\n        db.Products.AddRange(products);\r\n        return products;\r\n    }\r\n\r\n    private static async Task\u003cList\u003cProduct\u003e\u003e SeedBikeCatalogAsync(AppDbContext db)\r\n    {\r\n        var categories = new[]\r\n        {\r\n            new Category { Name = \"Горный\" },\r\n            new Category { Name = \"Шоссейный\" },\r\n            new Category { Name = \"Городской\" }\r\n        };\r\n        db.Categories.AddRange(categories);\r\n\r\n        var manufacturers = new[]\r\n        {\r\n            new Manufacturer { Name = \"Trek\" },\r\n            new Manufacturer { Name = \"Giant\" },\r\n            new Manufacturer { Name = \"Stels\" }\r\n        };\r\n        db.Manufacturers.AddRange(manufacturers);\r\n\r\n        var suppliers = new[]\r\n        {\r\n            new Supplier { Name = \"ООО «ВелоСклад»\" },\r\n            new Supplier { Name = \"ИП Петров\" }\r\n        };\r\n        db.Suppliers.AddRange(suppliers);\r\n\r\n        await db.SaveChangesAsync();\r\n\r\n        var products = new List\u003cProduct\u003e\r\n        {\r\n            new()\r\n            {\r\n                Article = \"A112T4\",\r\n                Name = \"Trail X 29\",\r\n                Description = \"Горный велосипед для бездорожья.\",\r\n                Price = 890m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 12,\r\n                Discount = 28m,\r\n                CategoryId = categories[0].Id,\r\n                ManufacturerId = manufacturers[0].Id,\r\n                SupplierId = suppliers[0].Id,\r\n                ImagePath = \"/images/products/1.jpg\"\r\n            },\r\n            new()\r\n            {\r\n                Article = \"G843H5\",\r\n                Name = \"Speed Pro\",\r\n                Description = \"Шоссейный велосипед.\",\r\n                Price = 450m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 0,\r\n                Discount = 0m,\r\n                CategoryId = categories[1].Id,\r\n                ManufacturerId = manufacturers[2].Id,\r\n                SupplierId = suppliers[0].Id,\r\n                ImagePath = null\r\n            },\r\n            new()\r\n            {\r\n                Article = \"D325D4\",\r\n                Name = \"City Comfort\",\r\n                Description = \"Городской велосипед.\",\r\n                Price = 1200m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 5,\r\n                Discount = 15m,\r\n                CategoryId = categories[2].Id,\r\n                ManufacturerId = manufacturers[2].Id,\r\n                SupplierId = suppliers[1].Id,\r\n                ImagePath = \"/images/products/3.jpg\"\r\n            },\r\n            new()\r\n            {\r\n                Article = \"S432T5\",\r\n                Name = \"Mountain Fury\",\r\n                Description = \"Гибридный велосипед.\",\r\n                Price = 760m,\r\n                Unit = \"шт.\",\r\n                QuantityOnStock = 8,\r\n                Discount = 10m,\r\n                CategoryId = categories[0].Id,\r\n                ManufacturerId = manufacturers[1].Id,\r\n                SupplierId = suppliers[0].Id,\r\n                ImagePath = \"/images/products/4.jpg\"\r\n            }\r\n        };\r\n        db.Products.AddRange(products);\r\n        return products;\r\n    }\r\n\r\n    private static void CopySeedImages(IWebHostEnvironment env)\r\n    {\r\n        var targetDir = Path.Combine(env.WebRootPath, \"images\", \"products\");\r\n        Directory.CreateDirectory(targetDir);\r\n\r\n        var importDir = Path.Combine(env.ContentRootPath, \"ImportData\", \"images\");\r\n        if (!Directory.Exists(importDir))\r\n            return;\r\n\r\n        foreach (var file in Directory.GetFiles(importDir))\r\n        {\r\n            var dest = Path.Combine(targetDir, Path.GetFileName(file));\r\n            if (!File.Exists(dest))\r\n                File.Copy(file, dest);\r\n        }\r\n    }\r\n}\r\n"},{"id":"file-Services-ImportService-cs","phase":"3. Services","module":"m1","title":"Services/ImportService.cs","vsHint":"Excel import (optional on exam).","terminal":"","code":"using ClosedXML.Excel;\r\nusing KodShopWeb.Data;\r\nusing KodShopWeb.Models;\r\nusing Microsoft.EntityFrameworkCore;\r\n\r\nnamespace KodShopWeb.Services;\r\n\r\n/// \u003csummary\u003e\r\n/// Сервис импорта данных из Excel-файлов в папке (Tovar.xlsx, user_import.xlsx).\r\n/// Вся операция выполняется в одной транзакции БД.\r\n/// \u003c/summary\u003e\r\n/// \u003cparam name=\"db\"\u003eКонтекст базы данных.\u003c/param\u003e\r\n/// \u003cparam name=\"env\"\u003eОкружение хоста для копирования изображений.\u003c/param\u003e\r\npublic class ImportService(AppDbContext db, IWebHostEnvironment env)\r\n{\r\n    /// \u003csummary\u003e\r\n    /// Импортирует пользователей и товары из указанной папки.\r\n    /// Ищет Tovar.xlsx (обязательно) и user_import.xlsx (опционально) рекурсивно.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"folderPath\"\u003eПуть к корневой папке импорта.\u003c/param\u003e\r\n    /// \u003creturns\u003eКортеж (успех, сообщение для пользователя).\u003c/returns\u003e\r\n    public async Task\u003c(bool Success, string Message)\u003e ImportFromFolderAsync(string folderPath)\r\n    {\r\n        if (!Directory.Exists(folderPath))\r\n            return (false, $\"Папка не найдена: {folderPath}\");\r\n\r\n        var tovarPath = Directory.GetFiles(folderPath, \"Tovar.xlsx\", SearchOption.AllDirectories).FirstOrDefault();\r\n        var usersPath = Directory.GetFiles(folderPath, \"user_import.xlsx\", SearchOption.AllDirectories).FirstOrDefault();\r\n\r\n        if (tovarPath is null)\r\n            return (false, \"Файл Tovar.xlsx не найден.\");\r\n\r\n        // Откат при любой ошибке — целостность данных.\r\n        await using var transaction = await db.Database.BeginTransactionAsync();\r\n        try\r\n        {\r\n            if (usersPath is not null)\r\n                await ImportUsersAsync(usersPath);\r\n\r\n            await ImportProductsAsync(tovarPath, folderPath);\r\n            await db.SaveChangesAsync();\r\n            await transaction.CommitAsync();\r\n            return (true, \"Импорт выполнен успешно.\");\r\n        }\r\n        catch (Exception ex)\r\n        {\r\n            await transaction.RollbackAsync();\r\n            return (false, $\"Ошибка импорта: {ex.Message}\");\r\n        }\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Импортирует пользователей из user_import.xlsx.\r\n    /// Столбцы: роль, ФИО, логин, пароль. Существующие логины обновляются.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"path\"\u003eПуть к файлу Excel.\u003c/param\u003e\r\n    private async Task ImportUsersAsync(string path)\r\n    {\r\n        using var workbook = new XLWorkbook(path);\r\n        var rows = workbook.Worksheet(1).RowsUsed().Skip(1);\r\n\r\n        foreach (var row in rows)\r\n        {\r\n            var roleName = row.Cell(1).GetString().Trim();\r\n            var fullName = row.Cell(2).GetString().Trim();\r\n            var login = row.Cell(3).GetString().Trim();\r\n            var password = row.Cell(4).GetString().Trim();\r\n\r\n            if (string.IsNullOrWhiteSpace(login))\r\n                continue;\r\n\r\n            // Сопоставление русских названий ролей из файла импорта.\r\n            var role = roleName switch\r\n            {\r\n                \"Администратор\" =\u003e UserRole.Administrator,\r\n                \"Менеджер\" =\u003e UserRole.Manager,\r\n                \"Авторизированный клиент\" =\u003e UserRole.Client,\r\n                _ =\u003e UserRole.Client\r\n            };\r\n\r\n            var user = await db.Users.FirstOrDefaultAsync(u =\u003e u.Login == login);\r\n            if (user is null)\r\n            {\r\n                db.Users.Add(new AppUser\r\n                {\r\n                    FullName = fullName,\r\n                    Login = login,\r\n                    Password = password,\r\n                    Role = role\r\n                });\r\n            }\r\n            else\r\n            {\r\n                user.FullName = fullName;\r\n                user.Password = password;\r\n                user.Role = role;\r\n            }\r\n        }\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Импортирует товары из Tovar.xlsx с автосозданием справочников и копированием изображений.\r\n    /// Заголовки столбцов ищутся по имени (несколько синонимов на поле).\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"path\"\u003eПуть к Tovar.xlsx.\u003c/param\u003e\r\n    /// \u003cparam name=\"folderPath\"\u003eКорень папки для поиска файлов изображений.\u003c/param\u003e\r\n    private async Task ImportProductsAsync(string path, string folderPath)\r\n    {\r\n        using var workbook = new XLWorkbook(path);\r\n        var rows = workbook.Worksheet(1).RowsUsed().Skip(1).ToList();\r\n        if (rows.Count == 0)\r\n            return;\r\n\r\n        var headers = workbook.Worksheet(1).Row(1).CellsUsed().Select(c =\u003e c.GetString().Trim()).ToList();\r\n\r\n        foreach (var row in rows)\r\n        {\r\n            var article = GetCell(row, headers, \"Артикул\");\r\n            if (string.IsNullOrWhiteSpace(article))\r\n                continue;\r\n\r\n            var categoryName = GetCell(row, headers, \"Категория товара\");\r\n            var manufacturerName = GetCell(row, headers, \"Производитель\");\r\n            var supplierName = GetCell(row, headers, \"Поставщик\");\r\n            var name = GetCell(row, headers, \"Наименование товара\", \"Название\");\r\n            var description = GetCell(row, headers, \"Описание товара\", \"Описание\");\r\n            var unit = GetCell(row, headers, \"Единица измерения\", defaultValue: \"шт.\");\r\n            var price = ParseDecimal(GetCell(row, headers, \"Цена\"));\r\n            var quantity = ParseInt(GetCell(row, headers, \"Кол-во на складе\", \"Количество на складе\"));\r\n            var discount = ParseDecimal(GetCell(row, headers, \"Действующая скидка\", \"Скидка\"));\r\n\r\n            var category = await EnsureCategoryAsync(categoryName);\r\n            var manufacturer = await EnsureManufacturerAsync(manufacturerName);\r\n            var supplier = await EnsureSupplierAsync(supplierName);\r\n\r\n            // Имя файла изображения может быть в любой ячейке строки.\r\n            var imageFileName = row.CellsUsed()\r\n                .Select(c =\u003e c.GetString().Trim())\r\n                .FirstOrDefault(v =\u003e v.EndsWith(\".jpg\", StringComparison.OrdinalIgnoreCase)\r\n                                  || v.EndsWith(\".jpeg\", StringComparison.OrdinalIgnoreCase)\r\n                                  || v.EndsWith(\".png\", StringComparison.OrdinalIgnoreCase));\r\n\r\n            string? imagePath = null;\r\n            if (!string.IsNullOrWhiteSpace(imageFileName))\r\n            {\r\n                var sourceImage = Directory.GetFiles(folderPath, imageFileName, SearchOption.AllDirectories).FirstOrDefault();\r\n                if (sourceImage is not null)\r\n                    imagePath = await CopyProductImageAsync(sourceImage, article);\r\n            }\r\n\r\n            var product = await db.Products.FirstOrDefaultAsync(p =\u003e p.Article == article);\r\n            if (product is null)\r\n            {\r\n                db.Products.Add(new Product\r\n                {\r\n                    Article = article,\r\n                    Name = name,\r\n                    Description = description,\r\n                    Unit = unit,\r\n                    Price = price,\r\n                    QuantityOnStock = quantity,\r\n                    Discount = discount,\r\n                    CategoryId = category.Id,\r\n                    ManufacturerId = manufacturer.Id,\r\n                    SupplierId = supplier.Id,\r\n                    ImagePath = imagePath\r\n                });\r\n            }\r\n            else\r\n            {\r\n                // Обновление существующего товара по артикулу.\r\n                product.Name = name;\r\n                product.Description = description;\r\n                product.Unit = unit;\r\n                product.Price = price;\r\n                product.QuantityOnStock = quantity;\r\n                product.Discount = discount;\r\n                product.CategoryId = category.Id;\r\n                product.ManufacturerId = manufacturer.Id;\r\n                product.SupplierId = supplier.Id;\r\n                if (imagePath is not null)\r\n                    product.ImagePath = imagePath;\r\n            }\r\n        }\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Находит или создаёт категорию по имени; пустое имя заменяется на «Без категории».\r\n    /// \u003c/summary\u003e\r\n    private async Task\u003cCategory\u003e EnsureCategoryAsync(string name)\r\n    {\r\n        name = string.IsNullOrWhiteSpace(name) ? \"Без категории\" : name;\r\n        var entity = await db.Categories.FirstOrDefaultAsync(c =\u003e c.Name == name);\r\n        if (entity is not null)\r\n            return entity;\r\n\r\n        entity = new Category { Name = name };\r\n        db.Categories.Add(entity);\r\n        await db.SaveChangesAsync();\r\n        return entity;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Находит или создаёт производителя по имени.\r\n    /// \u003c/summary\u003e\r\n    private async Task\u003cManufacturer\u003e EnsureManufacturerAsync(string name)\r\n    {\r\n        name = string.IsNullOrWhiteSpace(name) ? \"Не указан\" : name;\r\n        var entity = await db.Manufacturers.FirstOrDefaultAsync(m =\u003e m.Name == name);\r\n        if (entity is not null)\r\n            return entity;\r\n\r\n        entity = new Manufacturer { Name = name };\r\n        db.Manufacturers.Add(entity);\r\n        await db.SaveChangesAsync();\r\n        return entity;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Находит или создаёт поставщика по имени.\r\n    /// \u003c/summary\u003e\r\n    private async Task\u003cSupplier\u003e EnsureSupplierAsync(string name)\r\n    {\r\n        name = string.IsNullOrWhiteSpace(name) ? \"Не указан\" : name;\r\n        var entity = await db.Suppliers.FirstOrDefaultAsync(s =\u003e s.Name == name);\r\n        if (entity is not null)\r\n            return entity;\r\n\r\n        entity = new Supplier { Name = name };\r\n        db.Suppliers.Add(entity);\r\n        await db.SaveChangesAsync();\r\n        return entity;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Копирует файл изображения в wwwroot/images/products с именем по артикулу.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"sourcePath\"\u003eИсходный путь к файлу.\u003c/param\u003e\r\n    /// \u003cparam name=\"article\"\u003eАртикул товара для имени файла.\u003c/param\u003e\r\n    /// \u003creturns\u003eОтносительный URL изображения.\u003c/returns\u003e\r\n    private async Task\u003cstring\u003e CopyProductImageAsync(string sourcePath, string article)\r\n    {\r\n        var ext = Path.GetExtension(sourcePath);\r\n        var targetDir = Path.Combine(env.WebRootPath, \"images\", \"products\");\r\n        Directory.CreateDirectory(targetDir);\r\n        var fileName = $\"{article}{ext}\".Replace(\" \", \"_\");\r\n        var targetPath = Path.Combine(targetDir, fileName);\r\n        File.Copy(sourcePath, targetPath, overwrite: true);\r\n        await Task.CompletedTask;\r\n        return $\"/images/products/{fileName}\";\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Читает значение ячейки по одному из возможных заголовков столбца.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"row\"\u003eСтрока Excel.\u003c/param\u003e\r\n    /// \u003cparam name=\"headers\"\u003eСписок заголовков первой строки.\u003c/param\u003e\r\n    /// \u003cparam name=\"names\"\u003eВарианты имени столбца.\u003c/param\u003e\r\n    private static string GetCell(IXLRow row, IList\u003cstring\u003e headers, params string[] names)\r\n    {\r\n        foreach (var name in names)\r\n        {\r\n            for (var i = 0; i \u003c headers.Count; i++)\r\n            {\r\n                if (headers[i].Equals(name, StringComparison.OrdinalIgnoreCase))\r\n                    return row.Cell(i + 1).GetString().Trim();\r\n            }\r\n        }\r\n\r\n        return string.Empty;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Читает ячейку с подстановкой значения по умолчанию, если ячейка пуста.\r\n    /// \u003c/summary\u003e\r\n    private static string GetCell(IXLRow row, IList\u003cstring\u003e headers, string name, string defaultValue)\r\n    {\r\n        var value = GetCell(row, headers, name);\r\n        return string.IsNullOrWhiteSpace(value) ? defaultValue : value;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Парсит decimal из строки; запятая заменяется на точку (InvariantCulture).\r\n    /// \u003c/summary\u003e\r\n    private static decimal ParseDecimal(string value) =\u003e\r\n        decimal.TryParse(value.Replace(\u0027,\u0027, \u0027.\u0027), System.Globalization.NumberStyles.Any,\r\n            System.Globalization.CultureInfo.InvariantCulture, out var result)\r\n            ? result\r\n            : 0m;\r\n\r\n    /// \u003csummary\u003eПарсит целое число; при ошибке возвращает 0.\u003c/summary\u003e\r\n    private static int ParseInt(string value) =\u003e\r\n        int.TryParse(value, out var result) ? result : 0;\r\n}\r\n"},{"id":"file-Services-AuthService-cs","phase":"3. Services","module":"m2","title":"Services/AuthService.cs","vsHint":"Login validation.","terminal":"","code":"using System.Security.Claims;\r\nusing KodShopWeb.Data;\r\nusing KodShopWeb.Models;\r\nusing Microsoft.EntityFrameworkCore;\r\n\r\nnamespace KodShopWeb.Services;\r\n\r\n/// \u003csummary\u003e\r\n/// Сервис аутентификации пользователей.\r\n/// Проверяет логин/пароль и формирует ClaimsPrincipal для cookie-аутентификации.\r\n/// \u003c/summary\u003e\r\n/// \u003cparam name=\"db\"\u003eКонтекст базы данных.\u003c/param\u003e\r\npublic class AuthService(AppDbContext db)\r\n{\r\n    /// \u003csummary\u003e\r\n    /// Проверяет учётные данные и возвращает пользователя при успехе.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"login\"\u003eЛогин.\u003c/param\u003e\r\n    /// \u003cparam name=\"password\"\u003eПароль.\u003c/param\u003e\r\n    /// \u003creturns\u003eНайденный пользователь или null при неверных данных.\u003c/returns\u003e\r\n    public async Task\u003cAppUser?\u003e ValidateAsync(string login, string password) =\u003e\r\n        await db.Users.FirstOrDefaultAsync(u =\u003e u.Login == login \u0026\u0026 u.Password == password);\r\n\r\n    /// \u003csummary\u003e\r\n    /// Создаёт объект ClaimsPrincipal для установки cookie-сессии.\r\n    /// В claims записываются Id, ФИО и роль пользователя.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eАутентифицированный пользователь.\u003c/param\u003e\r\n    /// \u003creturns\u003ePrincipal с identity схемы «ShopCookie».\u003c/returns\u003e\r\n    public static ClaimsPrincipal CreatePrincipal(AppUser user)\r\n    {\r\n        var claims = new List\u003cClaim\u003e\r\n        {\r\n            new(ClaimTypes.NameIdentifier, user.Id.ToString()),\r\n            new(ClaimTypes.Name, user.FullName),\r\n            new(ClaimTypes.Role, user.Role.ToString())\r\n        };\r\n        return new ClaimsPrincipal(new ClaimsIdentity(claims, \"ShopCookie\"));\r\n    }\r\n}\r\n"},{"id":"file-Services-UserAccess-cs","phase":"3. Services","module":"m2","title":"Services/UserAccess.cs","vsHint":"Role checks for views.","terminal":"","code":"using System.Security.Claims;\r\nusing KodShopWeb.Models;\r\n\r\nnamespace KodShopWeb.Services;\r\n\r\n/// \u003csummary\u003e\r\n/// Вспомогательные методы проверки прав доступа по ClaimsPrincipal.\r\n/// Централизует логику ролей для контроллеров и представлений.\r\n/// \u003c/summary\u003e\r\npublic static class UserAccess\r\n{\r\n    /// \u003csummary\u003e\r\n    /// Извлекает роль текущего пользователя из claims.\r\n    /// Неавторизованным возвращает Guest.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eТекущий пользователь HTTP-контекста.\u003c/param\u003e\r\n    /// \u003creturns\u003eРоль пользователя или Guest.\u003c/returns\u003e\r\n    public static UserRole GetRole(ClaimsPrincipal? user)\r\n    {\r\n        if (user?.Identity?.IsAuthenticated != true)\r\n            return UserRole.Guest;\r\n\r\n        var roleValue = user.FindFirst(ClaimTypes.Role)?.Value;\r\n        return Enum.TryParse\u003cUserRole\u003e(roleValue, out var role) ? role : UserRole.Guest;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Возвращает отображаемое ФИО или «Гость» для неавторизованных.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eТекущий пользователь.\u003c/param\u003e\r\n    /// \u003creturns\u003eФИО из claim Name или запасные подписи.\u003c/returns\u003e\r\n    public static string GetFullName(ClaimsPrincipal? user) =\u003e\r\n        user?.Identity?.IsAuthenticated == true\r\n            ? user.FindFirst(ClaimTypes.Name)?.Value ?? \"Пользователь\"\r\n            : \"Гость\";\r\n\r\n    /// \u003csummary\u003e\r\n    /// Доступны ли расширенные инструменты каталога (фильтр, сортировка).\r\n    /// Разрешено менеджерам и администраторам.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eТекущий пользователь.\u003c/param\u003e\r\n    public static bool CanUseAdvancedProductTools(ClaimsPrincipal? user)\r\n    {\r\n        var role = GetRole(user);\r\n        return role is UserRole.Manager or UserRole.Administrator;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Может ли пользователь создавать, редактировать и удалять товары.\r\n    /// Только администратор.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eТекущий пользователь.\u003c/param\u003e\r\n    public static bool CanEditProducts(ClaimsPrincipal? user) =\u003e\r\n        GetRole(user) == UserRole.Administrator;\r\n\r\n    /// \u003csummary\u003e\r\n    /// Может ли пользователь просматривать раздел заказов.\r\n    /// Разрешено менеджерам и администраторам.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eТекущий пользователь.\u003c/param\u003e\r\n    public static bool CanViewOrders(ClaimsPrincipal? user)\r\n    {\r\n        var role = GetRole(user);\r\n        return role is UserRole.Manager or UserRole.Administrator;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Может ли пользователь создавать, редактировать и удалять заказы.\r\n    /// Только администратор.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"user\"\u003eТекущий пользователь.\u003c/param\u003e\r\n    public static bool CanEditOrders(ClaimsPrincipal? user) =\u003e\r\n        GetRole(user) == UserRole.Administrator;\r\n}\r\n"},{"id":"file-Services-ProductService-cs","phase":"3. Services","module":"m3","title":"Services/ProductService.cs","vsHint":"Products CRUD, filters, images.","terminal":"","code":"using KodShopWeb.Data;\r\nusing KodShopWeb.Models;\r\nusing Microsoft.EntityFrameworkCore;\r\n\r\nnamespace KodShopWeb.Services;\r\n\r\n/// \u003csummary\u003e\r\n/// Параметры запроса списка товаров: поиск, фильтр по скидке, сортировка.\r\n/// Используется в расширенном режиме каталога (менеджер/администратор).\r\n/// \u003c/summary\u003e\r\npublic class ProductQuery\r\n{\r\n    /// \u003csummary\u003eСтрока поиска по полям товара и справочникам.\u003c/summary\u003e\r\n    public string Search { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eВыбранный диапазон скидки для фильтрации.\u003c/summary\u003e\r\n    public DiscountFilterRange DiscountFilter { get; set; } = new(\"all\", \"Все диапазоны\", null, null);\r\n\r\n    /// \u003csummary\u003eПоле сортировки.\u003c/summary\u003e\r\n    public ProductSortField SortField { get; set; } = ProductSortField.Price;\r\n\r\n    /// \u003csummary\u003eНаправление сортировки.\u003c/summary\u003e\r\n    public SortDirection SortDirection { get; set; } = SortDirection.Asc;\r\n\r\n    /// \u003csummary\u003e\r\n    /// Собирает параметры запроса из query string HTTP-запроса.\r\n    /// \u003c/summary\u003e\r\n    public static ProductQuery FromRequest(\r\n        string? search,\r\n        string? discountFilter,\r\n        string? sortField,\r\n        string? sortDirection,\r\n        ShopSettings settings)\r\n    {\r\n        var query = new ProductQuery\r\n        {\r\n            Search = search?.Trim() ?? string.Empty,\r\n            DiscountFilter = ShopVariantPresets.ResolveDiscountFilter(settings, discountFilter),\r\n            SortField = sortField?.ToLowerInvariant() switch\r\n            {\r\n                \"quantity\" =\u003e ProductSortField.Quantity,\r\n                \"discount\" =\u003e ProductSortField.Discount,\r\n                _ =\u003e ProductSortField.Price\r\n            },\r\n            SortDirection = string.Equals(sortDirection, \"desc\", StringComparison.OrdinalIgnoreCase)\r\n                ? SortDirection.Desc\r\n                : SortDirection.Asc\r\n        };\r\n\r\n        return query;\r\n    }\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Сервис работы с каталогом товаров: выборка, CRUD, загрузка изображений.\r\n/// \u003c/summary\u003e\r\n/// \u003cparam name=\"db\"\u003eКонтекст базы данных.\u003c/param\u003e\r\npublic class ProductService(AppDbContext db)\r\n{\r\n    /// \u003csummary\u003e\r\n    /// Возвращает список товаров с учётом прав пользователя.\r\n    /// Для гостей/клиентов — простая сортировка по имени; для менеджеров — фильтры и сортировка из query.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"query\"\u003eПараметры фильтрации и сортировки.\u003c/param\u003e\r\n    /// \u003cparam name=\"advancedToolsEnabled\"\u003eВключены ли расширенные инструменты.\u003c/param\u003e\r\n    /// \u003creturns\u003eСписок товаров с подгруженными справочниками.\u003c/returns\u003e\r\n    public async Task\u003cList\u003cProduct\u003e\u003e GetProductsAsync(ProductQuery query, bool advancedToolsEnabled)\r\n    {\r\n        var products = db.Products\r\n            .Include(p =\u003e p.Category)\r\n            .Include(p =\u003e p.Manufacturer)\r\n            .Include(p =\u003e p.Supplier)\r\n            .AsQueryable();\r\n\r\n        if (advancedToolsEnabled)\r\n        {\r\n            products = ApplyFilters(products, query);\r\n            products = ApplySort(products, query);\r\n        }\r\n        else\r\n        {\r\n            products = products.OrderBy(p =\u003e p.Name);\r\n        }\r\n\r\n        return await products.ToListAsync();\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Загружает один товар по идентификатору со всеми связанными справочниками.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"id\"\u003eИдентификатор товара.\u003c/param\u003e\r\n    public Task\u003cProduct?\u003e GetByIdAsync(int id) =\u003e\r\n        db.Products\r\n            .Include(p =\u003e p.Category)\r\n            .Include(p =\u003e p.Manufacturer)\r\n            .Include(p =\u003e p.Supplier)\r\n            .FirstOrDefaultAsync(p =\u003e p.Id == id);\r\n\r\n    /// \u003csummary\u003eВозвращает все категории, отсортированные по имени.\u003c/summary\u003e\r\n    public Task\u003cList\u003cCategory\u003e\u003e GetCategoriesAsync() =\u003e\r\n        db.Categories.OrderBy(c =\u003e c.Name).ToListAsync();\r\n\r\n    /// \u003csummary\u003eВозвращает всех производителей, отсортированных по имени.\u003c/summary\u003e\r\n    public Task\u003cList\u003cManufacturer\u003e\u003e GetManufacturersAsync() =\u003e\r\n        db.Manufacturers.OrderBy(m =\u003e m.Name).ToListAsync();\r\n\r\n    /// \u003csummary\u003eВозвращает всех поставщиков, отсортированных по имени.\u003c/summary\u003e\r\n    public Task\u003cList\u003cSupplier\u003e\u003e GetSuppliersAsync() =\u003e\r\n        db.Suppliers.OrderBy(s =\u003e s.Name).ToListAsync();\r\n\r\n    /// \u003csummary\u003e\r\n    /// Создаёт или обновляет товар с валидацией и опциональной загрузкой изображения.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"product\"\u003eДанные товара (Id=0 — создание).\u003c/param\u003e\r\n    /// \u003cparam name=\"imageStream\"\u003eПоток нового изображения или null.\u003c/param\u003e\r\n    /// \u003cparam name=\"imageFileName\"\u003eИмя файла изображения.\u003c/param\u003e\r\n    /// \u003cparam name=\"env\"\u003eОкружение для пути wwwroot.\u003c/param\u003e\r\n    /// \u003creturns\u003eКортеж (успех, текст ошибки).\u003c/returns\u003e\r\n    public async Task\u003c(bool Success, string? Error)\u003e SaveAsync(\r\n        Product product,\r\n        Stream? imageStream,\r\n        string? imageFileName,\r\n        IWebHostEnvironment env)\r\n    {\r\n        // --- Серверная валидация бизнес-правил ---\r\n        if (product.Price \u003c 0)\r\n            return (false, \"Цена не может быть отрицательной.\");\r\n\r\n        if (product.QuantityOnStock \u003c 0)\r\n            return (false, \"Количество на складе не может быть отрицательным.\");\r\n\r\n        if (product.Discount \u003c 0 || product.Discount \u003e 100)\r\n            return (false, \"Скидка должна быть от 0 до 100%.\");\r\n\r\n        if (string.IsNullOrWhiteSpace(product.Article))\r\n            return (false, \"Артикул обязателен.\");\r\n\r\n        if (string.IsNullOrWhiteSpace(product.Name))\r\n            return (false, \"Наименование обязательно.\");\r\n\r\n        var duplicateArticle = await db.Products.AnyAsync(p =\u003e p.Article == product.Article \u0026\u0026 p.Id != product.Id);\r\n        if (duplicateArticle)\r\n            return (false, \"Товар с таким артикулом уже существует.\");\r\n\r\n        if (product.Id == 0)\r\n        {\r\n            db.Products.Add(product);\r\n        }\r\n        else\r\n        {\r\n            // Обновление существующей записи — копируем поля в tracked-сущность.\r\n            var existing = await db.Products.FindAsync(product.Id);\r\n            if (existing is null)\r\n                return (false, \"Товар не найден.\");\r\n\r\n            existing.Article = product.Article;\r\n            existing.Name = product.Name;\r\n            existing.Description = product.Description;\r\n            existing.Price = product.Price;\r\n            existing.Unit = product.Unit;\r\n            existing.QuantityOnStock = product.QuantityOnStock;\r\n            existing.Discount = product.Discount;\r\n            existing.CategoryId = product.CategoryId;\r\n            existing.ManufacturerId = product.ManufacturerId;\r\n            existing.SupplierId = product.SupplierId;\r\n            product = existing;\r\n        }\r\n\r\n        if (imageStream is not null \u0026\u0026 !string.IsNullOrWhiteSpace(imageFileName))\r\n        {\r\n            var imageResult = await SaveImageAsync(product, imageStream, imageFileName, env);\r\n            if (!imageResult.Success)\r\n                return imageResult;\r\n        }\r\n\r\n        await db.SaveChangesAsync();\r\n        return (true, null);\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Удаляет товар, если он не участвует в заказах.\r\n    /// Также удаляет файл изображения с диска.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"id\"\u003eИдентификатор товара.\u003c/param\u003e\r\n    public async Task\u003c(bool Success, string? Error)\u003e DeleteAsync(int id)\r\n    {\r\n        var product = await db.Products\r\n            .Include(p =\u003e p.OrderItems)\r\n            .FirstOrDefaultAsync(p =\u003e p.Id == id);\r\n\r\n        if (product is null)\r\n            return (false, \"Товар не найден.\");\r\n\r\n        if (product.OrderItems.Count \u003e 0)\r\n            return (false, \"Нельзя удалить товар, который присутствует в заказе.\");\r\n\r\n        if (!string.IsNullOrWhiteSpace(product.ImagePath))\r\n            DeletePhysicalImage(product.ImagePath, null);\r\n\r\n        db.Products.Remove(product);\r\n        await db.SaveChangesAsync();\r\n        return (true, null);\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Применяет текстовый поиск и фильтр по диапазону скидки к IQueryable.\r\n    /// \u003c/summary\u003e\r\n    private static IQueryable\u003cProduct\u003e ApplyFilters(IQueryable\u003cProduct\u003e source, ProductQuery query)\r\n    {\r\n        if (!string.IsNullOrWhiteSpace(query.Search))\r\n        {\r\n            var term = query.Search.Trim().ToLowerInvariant();\r\n            // Поиск по артикулу, названию, описанию и связанным справочникам.\r\n            source = source.Where(p =\u003e\r\n                p.Article.ToLower().Contains(term) ||\r\n                p.Name.ToLower().Contains(term) ||\r\n                p.Description.ToLower().Contains(term) ||\r\n                p.Category.Name.ToLower().Contains(term) ||\r\n                p.Manufacturer.Name.ToLower().Contains(term) ||\r\n                p.Supplier.Name.ToLower().Contains(term) ||\r\n                p.Unit.ToLower().Contains(term));\r\n        }\r\n\r\n        if (query.DiscountFilter.Min is not null)\r\n            source = source.Where(p =\u003e p.Discount \u003e= query.DiscountFilter.Min);\r\n\r\n        if (query.DiscountFilter.Max is not null)\r\n            source = source.Where(p =\u003e p.Discount \u003c= query.DiscountFilter.Max);\r\n\r\n        return source;\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Применяет сортировку на стороне сервера (IQueryable до материализации).\r\n    /// \u003c/summary\u003e\r\n    private static IQueryable\u003cProduct\u003e ApplySort(IQueryable\u003cProduct\u003e source, ProductQuery query)\r\n    {\r\n        var asc = query.SortDirection == SortDirection.Asc;\r\n\r\n        return query.SortField switch\r\n        {\r\n            ProductSortField.Quantity =\u003e asc\r\n                ? source.OrderBy(p =\u003e p.QuantityOnStock)\r\n                : source.OrderByDescending(p =\u003e p.QuantityOnStock),\r\n            ProductSortField.Discount =\u003e asc\r\n                ? source.OrderBy(p =\u003e p.Discount)\r\n                : source.OrderByDescending(p =\u003e p.Discount),\r\n            _ =\u003e asc\r\n                ? source.OrderBy(p =\u003e p.Price)\r\n                : source.OrderByDescending(p =\u003e p.Price)\r\n        };\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Сохраняет изображение товара в wwwroot/images/products.\r\n    /// Имя файла формируется из артикула; допустимы JPG, PNG, WEBP.\r\n    /// \u003c/summary\u003e\r\n    private async Task\u003c(bool Success, string? Error)\u003e SaveImageAsync(\r\n        Product product,\r\n        Stream imageStream,\r\n        string imageFileName,\r\n        IWebHostEnvironment env)\r\n    {\r\n        var allowed = new[] { \".jpg\", \".jpeg\", \".png\", \".webp\" };\r\n        var ext = Path.GetExtension(imageFileName).ToLowerInvariant();\r\n        if (!allowed.Contains(ext))\r\n            return (false, \"Допустимы только изображения JPG, PNG или WEBP.\");\r\n\r\n        var imagesDir = Path.Combine(env.WebRootPath, \"images\", \"products\");\r\n        Directory.CreateDirectory(imagesDir);\r\n\r\n        var fileName = $\"{product.Article}{ext}\".Replace(\" \", \"_\");\r\n        var physicalPath = Path.Combine(imagesDir, fileName);\r\n\r\n        // Удаляем старое изображение, если оно отличается от нового пути.\r\n        DeletePhysicalImage(product.ImagePath, physicalPath);\r\n\r\n        await using var target = File.Create(physicalPath);\r\n        imageStream.Position = 0;\r\n        await imageStream.CopyToAsync(target);\r\n\r\n        product.ImagePath = $\"/images/products/{fileName}\";\r\n        return (true, null);\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Удаляет физический файл изображения по относительному URL.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"relativePath\"\u003eПуть вида /images/products/...\u003c/param\u003e\r\n    /// \u003cparam name=\"exceptPath\"\u003eФизический путь, который не нужно удалять (новый файл).\u003c/param\u003e\r\n    private static void DeletePhysicalImage(string? relativePath, string? exceptPath)\r\n    {\r\n        if (string.IsNullOrWhiteSpace(relativePath))\r\n            return;\r\n\r\n        var physical = Path.Combine(Directory.GetCurrentDirectory(), \"wwwroot\", relativePath.TrimStart(\u0027/\u0027).Replace(\u0027/\u0027, Path.DirectorySeparatorChar));\r\n        if (File.Exists(physical) \u0026\u0026 !string.Equals(physical, exceptPath, StringComparison.OrdinalIgnoreCase))\r\n            File.Delete(physical);\r\n    }\r\n}\r\n"},{"id":"file-Services-OrderService-cs","phase":"3. Services","module":"m4","title":"Services/OrderService.cs","vsHint":"Orders CRUD (PU module).","terminal":"","code":"using KodShopWeb.Data;\r\nusing KodShopWeb.Models;\r\nusing Microsoft.EntityFrameworkCore;\r\n\r\nnamespace KodShopWeb.Services;\r\n\r\n/// \u003csummary\u003e\r\n/// Сервис управления заказами: выборка, сохранение и удаление.\r\n/// \u003c/summary\u003e\r\n/// \u003cparam name=\"db\"\u003eКонтекст базы данных.\u003c/param\u003e\r\npublic class OrderService(AppDbContext db)\r\n{\r\n    /// \u003csummary\u003e\r\n    /// Возвращает все заказы с пунктами выдачи, клиентами и позициями (с товарами),\r\n    /// отсортированные по дате заказа по убыванию.\r\n    /// \u003c/summary\u003e\r\n    public Task\u003cList\u003cOrder\u003e\u003e GetOrdersAsync() =\u003e\r\n        db.Orders\r\n            .Include(o =\u003e o.PickupPoint)\r\n            .Include(o =\u003e o.Client)\r\n            .Include(o =\u003e o.Items)\r\n                .ThenInclude(i =\u003e i.Product)\r\n            .OrderByDescending(o =\u003e o.OrderDate)\r\n            .ToListAsync();\r\n\r\n    /// \u003csummary\u003e\r\n    /// Загружает заказ по Id с пунктом выдачи, клиентом и позициями.\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"id\"\u003eИдентификатор заказа.\u003c/param\u003e\r\n    public Task\u003cOrder?\u003e GetByIdAsync(int id) =\u003e\r\n        db.Orders\r\n            .Include(o =\u003e o.PickupPoint)\r\n            .Include(o =\u003e o.Client)\r\n            .Include(o =\u003e o.Items)\r\n                .ThenInclude(i =\u003e i.Product)\r\n            .FirstOrDefaultAsync(o =\u003e o.Id == id);\r\n\r\n    /// \u003csummary\u003eВозвращает список пунктов выдачи для выпадающих списков.\u003c/summary\u003e\r\n    public Task\u003cList\u003cPickupPoint\u003e\u003e GetPickupPointsAsync() =\u003e\r\n        db.PickupPoints.OrderBy(p =\u003e p.Address).ToListAsync();\r\n\r\n    /// \u003csummary\u003eВозвращает клиентов (роль Client) для привязки к заказу.\u003c/summary\u003e\r\n    public Task\u003cList\u003cAppUser\u003e\u003e GetClientsAsync() =\u003e\r\n        db.Users.Where(u =\u003e u.Role == UserRole.Client).OrderBy(u =\u003e u.FullName).ToListAsync();\r\n\r\n    /// \u003csummary\u003e\r\n    /// Создаёт или обновляет заказ с проверкой уникальности артикула.\r\n    /// Позиции заказа через этот метод не редактируются (только шапка заказа).\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"order\"\u003eДанные заказа.\u003c/param\u003e\r\n    /// \u003creturns\u003eКортеж (успех, текст ошибки).\u003c/returns\u003e\r\n    public async Task\u003c(bool Success, string? Error)\u003e SaveAsync(Order order)\r\n    {\r\n        if (string.IsNullOrWhiteSpace(order.Article))\r\n            return (false, \"Артикул заказа обязателен.\");\r\n\r\n        var duplicate = await db.Orders.AnyAsync(o =\u003e o.Article == order.Article \u0026\u0026 o.Id != order.Id);\r\n        if (duplicate)\r\n            return (false, \"Заказ с таким артикулом уже существует.\");\r\n\r\n        if (order.Id == 0)\r\n        {\r\n            db.Orders.Add(order);\r\n        }\r\n        else\r\n        {\r\n            var existing = await db.Orders.FindAsync(order.Id);\r\n            if (existing is null)\r\n                return (false, \"Заказ не найден.\");\r\n\r\n            existing.Article = order.Article;\r\n            existing.Status = order.Status;\r\n            existing.OrderDate = order.OrderDate;\r\n            existing.DeliveryDate = order.DeliveryDate;\r\n            existing.PickupCode = order.PickupCode;\r\n            existing.PickupPointId = order.PickupPointId;\r\n            existing.ClientId = order.ClientId;\r\n        }\r\n\r\n        await db.SaveChangesAsync();\r\n        return (true, null);\r\n    }\r\n\r\n    /// \u003csummary\u003e\r\n    /// Удаляет заказ по идентификатору (позиции удаляются каскадно на уровне БД).\r\n    /// \u003c/summary\u003e\r\n    /// \u003cparam name=\"id\"\u003eИдентификатор заказа.\u003c/param\u003e\r\n    public async Task\u003c(bool Success, string? Error)\u003e DeleteAsync(int id)\r\n    {\r\n        var order = await db.Orders.FindAsync(id);\r\n        if (order is null)\r\n            return (false, \"Заказ не найден.\");\r\n\r\n        db.Orders.Remove(order);\r\n        await db.SaveChangesAsync();\r\n        return (true, null);\r\n    }\r\n}\r\n"},{"id":"file-ViewModels-ViewModels-cs","phase":"4. ViewModels","module":"m2","title":"ViewModels/ViewModels.cs","vsHint":"Forms for login, product, order.","terminal":"","code":"using System.ComponentModel.DataAnnotations;\r\nusing KodShopWeb.Models;\r\n\r\nnamespace KodShopWeb.ViewModels;\r\n\r\n/// \u003csummary\u003e\r\n/// Модель представления формы входа в систему.\r\n/// \u003c/summary\u003e\r\npublic class LoginViewModel\r\n{\r\n    /// \u003csummary\u003eЛогин пользователя.\u003c/summary\u003e\r\n    [Required(ErrorMessage = \"Введите логин\")]\r\n    public string Login { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eПароль пользователя.\u003c/summary\u003e\r\n    [Required(ErrorMessage = \"Введите пароль\")]\r\n    public string Password { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eСообщение об ошибке аутентификации (заполняется контроллером).\u003c/summary\u003e\r\n    public string? ErrorMessage { get; set; }\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Модель формы создания и редактирования товара.\r\n/// Содержит поля сущности, загрузку изображения и справочники для выпадающих списков.\r\n/// \u003c/summary\u003e\r\npublic class ProductFormViewModel\r\n{\r\n    /// \u003csummary\u003e0 — новый товар; иначе идентификатор для обновления.\u003c/summary\u003e\r\n    public int Id { get; set; }\r\n\r\n    /// \u003csummary\u003eАртикул товара (уникальный).\u003c/summary\u003e\r\n    [Required(ErrorMessage = \"Артикул обязателен\")]\r\n    public string Article { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eНаименование товара.\u003c/summary\u003e\r\n    [Required(ErrorMessage = \"Наименование обязательно\")]\r\n    public string Name { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eИдентификатор выбранной категории.\u003c/summary\u003e\r\n    [Required]\r\n    public int CategoryId { get; set; }\r\n\r\n    /// \u003csummary\u003eОписание товара.\u003c/summary\u003e\r\n    public string Description { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eИдентификатор производителя.\u003c/summary\u003e\r\n    [Required]\r\n    public int ManufacturerId { get; set; }\r\n\r\n    /// \u003csummary\u003eИдентификатор поставщика.\u003c/summary\u003e\r\n    [Required]\r\n    public int SupplierId { get; set; }\r\n\r\n    /// \u003csummary\u003eБазовая цена без скидки.\u003c/summary\u003e\r\n    [Range(0, double.MaxValue, ErrorMessage = \"Цена не может быть отрицательной\")]\r\n    public decimal Price { get; set; }\r\n\r\n    /// \u003csummary\u003eЕдиница измерения.\u003c/summary\u003e\r\n    public string Unit { get; set; } = \"шт.\";\r\n\r\n    /// \u003csummary\u003eКоличество на складе.\u003c/summary\u003e\r\n    [Range(0, int.MaxValue, ErrorMessage = \"Количество не может быть отрицательным\")]\r\n    public int QuantityOnStock { get; set; }\r\n\r\n    /// \u003csummary\u003eПроцент скидки (0–100).\u003c/summary\u003e\r\n    [Range(0, 100, ErrorMessage = \"Скидка от 0 до 100%\")]\r\n    public decimal Discount { get; set; }\r\n\r\n    /// \u003csummary\u003eТекущий путь к изображению (при редактировании без замены файла).\u003c/summary\u003e\r\n    public string? CurrentImagePath { get; set; }\r\n\r\n    /// \u003csummary\u003eЗагружаемый файл нового изображения.\u003c/summary\u003e\r\n    public IFormFile? ImageFile { get; set; }\r\n\r\n    // --- Справочники для UI ---\r\n\r\n    /// \u003csummary\u003eСписок категорий для select.\u003c/summary\u003e\r\n    public List\u003cCategory\u003e Categories { get; set; } = [];\r\n\r\n    /// \u003csummary\u003eСписок производителей для select.\u003c/summary\u003e\r\n    public List\u003cManufacturer\u003e Manufacturers { get; set; } = [];\r\n\r\n    /// \u003csummary\u003eСписок поставщиков для select.\u003c/summary\u003e\r\n    public List\u003cSupplier\u003e Suppliers { get; set; } = [];\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Строка таблицы каталога товаров (готовые данные для отображения).\r\n/// \u003c/summary\u003e\r\npublic class ProductRowViewModel\r\n{\r\n    /// \u003csummary\u003eИдентификатор товара.\u003c/summary\u003e\r\n    public int Id { get; set; }\r\n\r\n    /// \u003csummary\u003eАртикул.\u003c/summary\u003e\r\n    public string Article { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eНаименование.\u003c/summary\u003e\r\n    public string Name { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eНазвание категории (строка, не Id).\u003c/summary\u003e\r\n    public string Category { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eОписание.\u003c/summary\u003e\r\n    public string Description { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eНазвание производителя.\u003c/summary\u003e\r\n    public string Manufacturer { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eНазвание поставщика.\u003c/summary\u003e\r\n    public string Supplier { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eБазовая цена.\u003c/summary\u003e\r\n    public decimal Price { get; set; }\r\n\r\n    /// \u003csummary\u003eЦена с учётом скидки.\u003c/summary\u003e\r\n    public decimal FinalPrice { get; set; }\r\n\r\n    /// \u003csummary\u003eЕсть ли действующая скидка.\u003c/summary\u003e\r\n    public bool HasDiscount { get; set; }\r\n\r\n    /// \u003csummary\u003eЕдиница измерения.\u003c/summary\u003e\r\n    public string Unit { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eОстаток на складе.\u003c/summary\u003e\r\n    public int QuantityOnStock { get; set; }\r\n\r\n    /// \u003csummary\u003eПроцент скидки.\u003c/summary\u003e\r\n    public decimal Discount { get; set; }\r\n\r\n    /// \u003csummary\u003eURL изображения или заглушка picture.png.\u003c/summary\u003e\r\n    public string ImageUrl { get; set; } = \"/images/picture.png\";\r\n\r\n    /// \u003csummary\u003eCSS-класс строки (out-of-stock, discount-highlight).\u003c/summary\u003e\r\n    public string RowClass { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eInline-стиль фона строки (hex или transparent).\u003c/summary\u003e\r\n    public string RowStyle { get; set; } = string.Empty;\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Модель главной страницы каталога: список товаров и флаги прав доступа.\r\n/// \u003c/summary\u003e\r\npublic class ProductsIndexViewModel\r\n{\r\n    /// \u003csummary\u003eСтроки таблицы каталога.\u003c/summary\u003e\r\n    public List\u003cProductRowViewModel\u003e Products { get; set; } = [];\r\n\r\n    /// \u003csummary\u003eДоступны ли фильтр и сортировка (менеджер/админ).\u003c/summary\u003e\r\n    public bool CanUseAdvancedTools { get; set; }\r\n\r\n    /// \u003csummary\u003eМожет ли пользователь редактировать товары.\u003c/summary\u003e\r\n    public bool CanEditProducts { get; set; }\r\n\r\n    /// \u003csummary\u003eПорог скидки для подсветки строк (%).\u003c/summary\u003e\r\n    public decimal DiscountHighlightPercent { get; set; }\r\n\r\n    /// \u003csummary\u003eЦвет подсветки больших скидок.\u003c/summary\u003e\r\n    public string DiscountHighlightColor { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eВариант PU (профильный) или BU (базовый).\u003c/summary\u003e\r\n    public bool IsProfileVariant { get; set; }\r\n\r\n    /// \u003csummary\u003eСообщение об успехе/ошибке операции.\u003c/summary\u003e\r\n    public string? StatusMessage { get; set; }\r\n\r\n    /// \u003csummary\u003eТекущая строка поиска (серверная фильтрация).\u003c/summary\u003e\r\n    public string Search { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eКлюч выбранного диапазона скидки.\u003c/summary\u003e\r\n    public string DiscountFilterKey { get; set; } = \"all\";\r\n\r\n    /// \u003csummary\u003eТекущее поле сортировки.\u003c/summary\u003e\r\n    public ProductSortField SortField { get; set; } = ProductSortField.Price;\r\n\r\n    /// \u003csummary\u003eТекущее направление сортировки.\u003c/summary\u003e\r\n    public SortDirection SortDirection { get; set; } = SortDirection.Asc;\r\n\r\n    /// \u003csummary\u003eДоступные диапазоны скидок для выпадающего списка.\u003c/summary\u003e\r\n    public List\u003cDiscountFilterRange\u003e DiscountFilterOptions { get; set; } = [];\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Модель формы создания и редактирования заказа.\r\n/// \u003c/summary\u003e\r\npublic class OrderFormViewModel\r\n{\r\n    /// \u003csummary\u003e0 — новый заказ.\u003c/summary\u003e\r\n    public int Id { get; set; }\r\n\r\n    /// \u003csummary\u003eАртикул заказа.\u003c/summary\u003e\r\n    [Required(ErrorMessage = \"Артикул обязателен\")]\r\n    public string Article { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eСтатус заказа.\u003c/summary\u003e\r\n    [Required]\r\n    public OrderStatus Status { get; set; }\r\n\r\n    /// \u003csummary\u003eВыбранный пункт выдачи.\u003c/summary\u003e\r\n    [Required]\r\n    public int PickupPointId { get; set; }\r\n\r\n    /// \u003csummary\u003eДата оформления.\u003c/summary\u003e\r\n    [Required]\r\n    public DateTime OrderDate { get; set; }\r\n\r\n    /// \u003csummary\u003eДата доставки (необязательно).\u003c/summary\u003e\r\n    public DateTime? DeliveryDate { get; set; }\r\n\r\n    /// \u003csummary\u003eКод получения в пункте выдачи.\u003c/summary\u003e\r\n    public string PickupCode { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eИдентификатор клиента (необязательно).\u003c/summary\u003e\r\n    public int? ClientId { get; set; }\r\n\r\n    // --- Справочники для UI ---\r\n\r\n    /// \u003csummary\u003eСписок пунктов выдачи.\u003c/summary\u003e\r\n    public List\u003cPickupPoint\u003e PickupPoints { get; set; } = [];\r\n\r\n    /// \u003csummary\u003eСписок клиентов для привязки к заказу.\u003c/summary\u003e\r\n liveryDate { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eФИО клиента или «—».\u003c/summary\u003e\r\n    public string ClientName { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eИтоговая сумма заказа.\u003c/summary\u003e\r\n    public string TotalAmount { get; set; } = string.Empty;\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Модель страницы импорта данных из папки с Excel-файлами.\r\n/// \u003c/summary\u003e\r\npublic class ImportViewModel\r\n{\r\n    /// \u003csummary\u003eПуть к папке импорта на диске сервера.\u003c/summary\u003e\r\n    public string FolderPath { get; set; } = string.Empty;\r\n\r\n    /// \u003csummary\u003eТекст результата последнего импорта.\u003c/summary\u003e\r\n    public string? Message { get; set; }\r\n\r\n    /// \u003csummary\u003eУспешен ли последний импорт.\u003c/summary\u003e\r\n    public bool Success { get; set; }\r\n}\r\n\r\n/// \u003csummary\u003e\r\n/// Модель страницы списка заказов.\r\n/// \u003c/summary\u003e\r\npublic class OrdersIndexViewModel\r\n{\r\n    /// \u003csummary\u003eСтроки таблицы заказов.\u003c/summary\u003e\r\n    public List\u003cOrderRowViewModel\u003e Orders { get; set; } = [];\r\n\r\n    /// \u003csummary\u003eМожет ли пользователь редактировать и удалять заказы.\u003c/summary\u003e\r\n    public bool CanEdit { get; set; }\r\n\r\n    /// \u003csummary\u003eFlash-сообщение после CRUD-операций.\u003c/summary\u003e\r\n    public string? Message { get; set; }\r\n}\r\n"},{"id":"file-Program-cs","phase":"5. Program","module":"m2","title":"Program.cs","vsHint":"Replace Program.cs - DI, auth, routes.","terminal":"","code":"using KodShopWeb.Data;\nusing KodShopWeb.Models;\nusing KodShopWeb.Services;\nusing Microsoft.AspNetCore.Authentication.Cookies;\nusing Microsoft.EntityFrameworkCore;\n\n// Точка входа веб-приложения «КодШоп» (KodShopWeb).\n// Конфигурирует DI, аутентификацию, БД и конвейер HTTP-запросов.\n\nvar builder = WebApplication.CreateBuilder(args);\n\n// Загрузка настроек магазина из appsettings (секция «Shop») и применение пресета PU/BU.\nvar shopSettings = builder.Configuration.GetSection(ShopSettings.SectionName).Get\u003cShopSettings\u003e() ?? new ShopSettings();\nShopVariantPresets.Apply(shopSettings);\n\n// Настройки магазина — singleton (один экземпляр на всё приложение).\nbuilder.Services.AddSingleton(shopSettings);\n\n// Контекст EF Core с SQLite; строка подключения — из конфигурации.\nbuilder.Services.AddDbContext\u003cAppDbContext\u003e(options =\u003e\n    options.UseSqlite(builder.Configuration.GetConnectionString(\"DefaultConnection\")));\n\n// Регистрация доменных сервисов (scoped — на один HTTP-запрос).\nbuilder.Services.AddScoped\u003cAuthService\u003e();\nbuilder.Services.AddScoped\u003cProductService\u003e();\nbuilder.Services.AddScoped\u003cOrderService\u003e();\nbuilder.Services.AddScoped\u003cImportService\u003e();\n\n// Аутентификация по cookie; пути входа/выхода и отказа в доступе.\nbuilder.Services.AddAuthentication(CookieAuthenticationDefaults.AuthenticationScheme)\n    .AddCookie(options =\u003e\n    {\n        options.LoginPath = \"/Account/Login\";\n        options.LogoutPath = \"/Account/Logout\";\n        options.AccessDeniedPath = \"/Account/Login\";\n    });\nbuilder.Services.AddAuthorization();\n\nbuilder.Services.AddControllersWithViews();\n\nvar app = builder.Build();\n\n// При старте: создание БД (если нет) и начальное заполнение тестовыми данными.\nusing (var scope = app.Services.CreateScope())\n{\n    var db = scope.ServiceProvider.GetRequiredService\u003cAppDbContext\u003e();\n    var env = scope.ServiceProvider.GetRequiredService\u003cIWebHostEnvironment\u003e();\n    var settings = scope.ServiceProvider.GetRequiredService\u003cShopSettings\u003e();\n    await DbSeeder.SeedAsync(db, env, settings);\n}\n\n// В production — обработчик ошибок и HSTS; в Development middleware не подключается.\nif (!app.Environment.IsDevelopment())\n{\n    app.UseExceptionHandler(\"/Home/Error\");\n    app.UseHst
